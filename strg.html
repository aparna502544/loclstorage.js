<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="text" placeholder="enter your name"><br><br>
    <input type="text" id="pass" placeholder="enter your password"><br><br>
    <!-- <input type="button" value="submit"> -->
     <button id="btn">Submit</button>




     <script>
        let name=document.getElementById("text");
        let password=document.getElementById("pass");
        let submit =document.getElementById("btn");
    submit.addEventListener("click",(e)=>{
                e.preventDefault();

                localStorage.setItem("user","name: " + name.value +" password: "+ password.value);

        })


     </script>
</body>
</html>
